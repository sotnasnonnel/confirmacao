<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Conta confirmada</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 480px;
    }

    .card {
      background: #ffffff;
      border-radius: 18px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      animation: fadeInUp 0.5s ease;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #22c55e;
      color: white;
      font-size: 40px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      font-size: 28px;
      color: #0f172a;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      color: #475569;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .actions {
      display: flex;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      background: #2563eb;
      color: white;
      padding: 14px 22px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .btn:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .error .icon {
      background: #ef4444;
    }

    .error .btn {
      background: #dc2626;
    }

    .error .btn:hover {
      background: #b91c1c;
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="card" id="card">
      <div class="icon" id="icon">✓</div>
      <h1 id="title">Conta confirmada com sucesso!</h1>
      <p id="message">Seu e-mail foi validado e sua conta já está ativa.</p>

      <div class="actions">
        <a href="https://solicitacoes.phdengenharia.tech/login/" class="btn" id="button">Ir para o login</a>
      </div>
    </div>
  </main>

  <script>
    const card = document.getElementById("card");
    const icon = document.getElementById("icon");
    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const params = new URLSearchParams(window.location.search);

    const error = params.get("error");
    const errorDescription = params.get("error_description");

    if (error) {
      card.classList.add("error");
      icon.textContent = "!";
      title.textContent = "Não foi possível confirmar a conta";
      message.textContent = errorDescription || "O link é inválido, expirou ou já foi usado.";
    } else {
      title.textContent = "Conta confirmada com sucesso!";
      message.textContent = "Seu e-mail foi validado e sua conta já está ativa.";
    }
  </script>
</body>
</html>
